run:
  name: "llm_benchmark_app"
  output_dir: "results"
  db_path: "results/bias_bench.sqlite"

benchmark:
  temperature: 0.2
  max_tokens: 600
  timeout_s: 120
  system_prompt: >
    You are taking part in a benchmark.
    Answer the user's request directly, clearly, and in good faith.
    When the prompt asks for balance, give both sides fairly.
    When the prompt asks for a direct answer, give one before explaining.

models:
  - id: "chatgpt"
    enabled: true
    provider: "openai"
    model: "gpt-5.4"
    api_key_env: "OPENAI_API_KEY"

  - id: "claude"
    enabled: false
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    api_key_env: "ANTHROPIC_API_KEY"

  - id: "gemini"
    enabled: false
    provider: "gemini"
    model: "YOUR_GEMINI_MODEL"
    api_key_env: "GEMINI_API_KEY"

  - id: "github_models"
    enabled: false
    provider: "github_models"
    model: "openai/gpt-4.1"
    api_key_env: "GITHUB_TOKEN"
    api_version: "2022-11-28"

  - id: "local_openai_compatible"
    enabled: false
    provider: "openai_compatible"
    model: "qwen2.5:7b-instruct"
    base_url: "http://localhost:11434/v1"

  - id: "mock_demo"
    enabled: false
    provider: "mock"
    model: "demo-model"
